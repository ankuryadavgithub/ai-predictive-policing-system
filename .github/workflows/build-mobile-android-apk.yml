name: Build Mobile Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    paths:
      - "mobile-android-app/**"
      - ".github/workflows/build-mobile-android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        working-directory: mobile-android-app
        run: gradle :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: predictive-policing-debug-apk
          path: mobile-android-app/app/build/outputs/apk/debug/app-debug.apk
